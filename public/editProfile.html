<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
    --primary: #4a664d;
    --bg: #f6f4ee;
    --card: rgba(255,255,255,0.7);
    --border: rgba(0,0,0,0.08);
    --text: #2d2b26;
    --muted: #6b665c;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background: var(--bg);
}

/* ===== HEADER ===== */
.topbar {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    padding: 15px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
}

.topbar h2 {
    font-size: 1.2rem;
    font-weight: 700;
}

/* ===== MAIN LAYOUT ===== */
.container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 20px;
}

/* ===== CARD ===== */
.card {
    background: var(--card);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px;
    animation: fadeUp 0.6s ease;
}

/* ===== GRID ===== */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 25px;
}

/* ===== FULL WIDTH ===== */
.full {
    grid-column: span 2;
}

/* ===== INPUT GROUP ===== */
.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.input-group label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
}

.input-group input,
.input-group select {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: white;
    font-size: 0.9rem;
    outline: none;
    transition: 0.25s;
}

.input-group input:focus,
.input-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(74,102,77,0.15);
}

/* ===== PROFILE HEADER ===== */
.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
}

.profile-header img {
    width: 70px;
    height: 70px;
    border-radius: 18px;
}

.profile-header h3 {
    font-size: 1.4rem;
    font-weight: 700;
}

/* ===== ACTION BAR ===== */
.actions {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-top: 30px;
}

.btn {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    background: #3b523d;
}

.btn-secondary {
    background: #e5e2da;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    .full {
        grid-column: span 1;
    }

    .container {
        margin: 20px;
    }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>Edit Farmer Profile</h2>
</div>

<!-- MAIN -->
<div class="container">
    <div class="card">

        <!-- PROFILE HEADER -->
        <div class="profile-header">
            <img src="https://ui-avatars.com/api/?name=Farmer+Joe">
            <div>
                <h3>Farmer John Doe</h3>
                <p style="font-size:0.8rem; color:#777;">Farm ID: #IN-9921</p>
            </div>
        </div>

        <!-- FORM -->
        <div class="form-grid">

            <div class="input-group">
                <label>First Name</label>
                <input type="text" placeholder="John">
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" placeholder="Doe">
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" placeholder="32">
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="input-group full">
                <label>Location</label>
                <input type="text" placeholder="Punjab, India">
            </div>

            <div class="input-group">
                <label>Farmer ID</label>
                <input type="text" placeholder="IN-9921">
            </div>

            <div class="input-group">
                <label>Contact Number</label>
                <input type="text" placeholder="+91 XXXXX XXXXX">
            </div>

        </div>

        <!-- ACTION BUTTONS -->
        <div class="actions">
            <button class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>

    </div>
</div>

<script>
function saveProfile() {
    alert("Profile Updated Successfully!");
    window.location.href = "MainDash.html";
}
</script>

</body>
</html>
