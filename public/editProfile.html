<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root {
    --primary: #4a664d;
    --bg: #f6f4ee;
    --card: rgba(255,255,255,0.7);
    --border: rgba(0,0,0,0.08);
    --text: #2d2b26;
    --muted: #6b665c;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background-color: var(--bg);
    background-image: url('back.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* ===== HEADER ===== */
.topbar {
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    padding: 15px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
}

.topbar h2 {
    font-size: 1.2rem;
    font-weight: 700;
}

/* ===== MAIN LAYOUT ===== */
.container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 20px;
}

/* ===== CARD ===== */
.card {
    background: var(--card);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px;
    animation: fadeUp 0.6s ease;
}

/* ===== GRID ===== */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 25px;
}

/* ===== FULL WIDTH ===== */
.full {
    grid-column: span 2;
}

/* ===== INPUT GROUP ===== */
.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.input-group label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
}

.input-group input,
.input-group select {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: white;
    font-size: 0.9rem;
    outline: none;
    transition: 0.25s;
}

.input-group input:focus,
.input-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(74,102,77,0.15);
}

/* ===== PROFILE HEADER ===== */
.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
}

.profile-header img {
    width: 70px;
    height: 70px;
    border-radius: 18px;
}

.profile-header h3 {
    font-size: 1.4rem;
    font-weight: 700;
}

/* ===== ACTION BAR ===== */
.actions {
    display: flex;
    justify-content: flex-end;
    gap: 15px;
    margin-top: 30px;
}

.btn {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    background: #3b523d;
}

.btn-secondary {
    background: #e5e2da;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .form-grid {
        grid-template-columns: 1fr;
    }

    .full {
        grid-column: span 1;
    }

    .container {
        margin: 20px;
    }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>Edit Farmer Profile</h2>
</div>

<!-- MAIN -->
<div class="container">
    <div class="card">

        <!-- PROFILE HEADER -->
        <div class="profile-header">
            <img src="https://ui-avatars.com/api/?name=Farmer+Joe" id="profile-img">
            <div>
                <h3 id="profile-name">Farmer John Doe</h3>
                <p id="profile-farm-id" style="font-size:0.8rem; color:#777;">Farm ID: #IN-9921</p>
            </div>
        </div>

        <!-- FORM -->
        <div class="form-grid">

            <div class="input-group">
                <label>First Name</label>
                <input type="text" id="firstNameInput" placeholder="John">
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" id="lastNameInput" placeholder="Doe">
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" id="ageInput" placeholder="32">
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select id="genderInput">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="input-group full">
                <label>Location</label>
                <input type="text" id="locationInput" placeholder="Punjab, India">
            </div>

            <div class="input-group">
                <label>Farmer ID</label>
                <input type="text" id="farmIdInput" placeholder="IN-9921">
            </div>

            <div class="input-group">
                <label>Contact Number</label>
                <input type="text" id="contactInput" placeholder="+91 XXXXX XXXXX">
            </div>

        </div>

        <!-- ACTION BUTTONS -->
        <div class="actions">
            <button class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>

    </div>
</div>

<script>
// Apply cached data immediately to prevent flicker
const cachedAvatar = localStorage.getItem('cachedAvatarUrl');
const cachedName = localStorage.getItem('cachedFullName');
const cachedFarmId = localStorage.getItem('cachedFarmId');

if (cachedAvatar) {
    const profileImg = document.getElementById('profile-img');
    if (profileImg) profileImg.src = cachedAvatar;
}
if (cachedName) {
    const profileName = document.getElementById('profile-name');
    if (profileName) profileName.textContent = cachedName;
}
if (cachedFarmId) {
    const profileFarmId = document.getElementById('profile-farm-id');
    if (profileFarmId) profileFarmId.textContent = `Farm ID: #${cachedFarmId}`;
}

window.addEventListener('load', async () => {
    try {
        const userId = localStorage.getItem('userId');
        if (!userId) { window.location.href = 'login_signup.html'; return; }
        const res = await fetch('/api/profile', {
            headers: { 'user-id': userId }
        });
        const profile = await res.json();
        
        if (profile) {
            if (profile.first_name) document.getElementById('firstNameInput').value = profile.first_name;
            if (profile.last_name) document.getElementById('lastNameInput').value = profile.last_name;
            if (profile.age) document.getElementById('ageInput').value = profile.age;
            if (profile.gender) document.getElementById('genderInput').value = profile.gender;
            if (profile.location) document.getElementById('locationInput').value = profile.location;
            if (profile.farm_id) document.getElementById('farmIdInput').value = profile.farm_id;
            if (profile.contact_number) document.getElementById('contactInput').value = profile.contact_number;
            
            const fullName = (profile.first_name || profile.last_name) 
                ? `${profile.first_name || ''} ${profile.last_name || ''}`.trim() 
                : 'Farmer';
                
            document.getElementById('profile-name').textContent = fullName;
            document.getElementById('profile-farm-id').textContent = profile.farm_id ? `Farm ID: #${profile.farm_id}` : 'Farm ID: N/A';
            
            const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(fullName)}&background=064e3b&color=fff`;
            document.getElementById('profile-img').src = avatarUrl;
            
            // Cache the data
            localStorage.setItem('cachedFullName', fullName);
            localStorage.setItem('cachedFarmId', profile.farm_id || '');
            localStorage.setItem('cachedAvatarUrl', avatarUrl);
        }
    } catch (err) {
        console.error('Error loading profile:', err);
    }
});

async function saveProfile() {
    const payload = {
        first_name: document.getElementById('firstNameInput').value,
        last_name: document.getElementById('lastNameInput').value,
        age: parseInt(document.getElementById('ageInput').value) || null,
        gender: document.getElementById('genderInput').value,
        location: document.getElementById('locationInput').value,
        farm_id: document.getElementById('farmIdInput').value,
        contact_number: document.getElementById('contactInput').value
    };

    try {
        const userId = localStorage.getItem('userId');
        if (!userId) { window.location.href = 'login_signup.html'; return; }
        const res = await fetch('/api/profile', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'user-id': userId
            },
            body: JSON.stringify(payload)
        });
        
        if (res.ok) {
            alert("Profile Updated Successfully!");
            window.location.href = "MainDash.html";
        } else {
            const data = await res.json();
            alert("Error: " + data.error);
        }
    } catch (err) {
        console.error('Error saving profile:', err);
        alert("Failed to connect to server.");
    }
}
</script>

</body>
</html>
