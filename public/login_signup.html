<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmTracker — Welcome</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      /* tells the browser to include padding and borders inside the width you specify.tells the browser to include padding and borders inside the width you specify. */
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #f5ede0;
      --warm-tan: #c9a87c;
      --rust: #c0673a;
      --sage: #7a9e7e;
      --sky: #9bbfcc;
      --dark-brown: #3d2b1f;
      --glass-bg: rgba(255, 252, 245, 0.55);
      --glass-border: rgba(255, 252, 245, 0.55);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      background: var(--sky);
      overflow: hidden;
      position: relative;
    }

    /* ── SCENE ── */
    .scene {
      position: fixed;
      inset: 0;
      /* means top,bottom,left,right = 0 */
      z-index: 0;
      transition: filter 0.6s ease;
      background: var(--sky);
    }

    .scene.blurred {
      filter: blur(8px) brightness(0.85);
    }

    .scene img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* It crops the edges if necessary so the image is never stretched or "squished". */
      display: block;
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(61, 43, 31, 0);
      transition: background 0.6s ease;
      z-index: 1;
      pointer-events: none;
      /* . It ensures that even though the overlay covers the screen, you can still click "through" it to hit buttons on the landing page. */
    }

    .overlay.active {
      background: rgba(61, 43, 31, 0.18);
    }

    /* ── STAGE (landing + modal share same z-layer) ── */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── LANDING ── */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .landing.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
      /* used to move an element vertically along the Y-axis (up and down). */
    }

    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--dark-brown);
      font-size: clamp(2rem, 6vw, 3.6rem);
      text-shadow: none;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .logo span {
      color: var(--dark-brown);
    }

    .tagline {
      color: #ffffff;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(40, 25, 10, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 7px 20px;
      border-radius: 50px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }

    .btn-group {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }

    .btn-primary,
    .btn-secondary {
      padding: 13px 36px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: rgba(255, 252, 245, 0.45);
      color: var(--dark-brown);
      border: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 0 0 1.5px rgba(255, 252, 245, 0.6), 0 4px 20px rgba(61, 43, 31, 0.15);
      text-shadow: 0 1px 4px rgba(61, 43, 31, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255, 252, 245, 0.7);
      box-shadow: inset 0 0 0 1.5px rgba(255, 252, 245, 0.8), 0 8px 28px rgba(61, 43, 31, 0.2);
    }

    .btn-primary:active,
    .btn-secondary:active {
      transform: translateY(1px);
    }

    /* ── MODAL CARD ── */
    .card-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    .card-wrap.visible {
      opacity: 1;
      pointer-events: all;
    }

    .card {
      background: var(--glass-bg);
      border: 1.5px solid var(--glass-border);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border-radius: 24px;
      padding: 38px 40px 34px;
      width: min(400px, 90vw);
      box-shadow: 0 12px 48px rgba(61, 43, 31, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      transform: translateY(24px) scale(0.96);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card-wrap.visible .card {
      transform: translateY(0) scale(1);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      color: var(--dark-brown);
      font-size: 1.7rem;
      margin-bottom: 6px;
      text-align: center;
    }

    .card-sub {
      text-align: center;
      font-size: 0.82rem;
      color: #6b5040;
      margin-bottom: 26px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      background: rgba(255, 252, 245, 0.4);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 26px;
      border: 1px solid rgba(255, 252, 245, 0.6);
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a6e56;
      cursor: pointer;
      border-radius: 9px;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      user-select: none;
    }

    .tab.active {
      background: var(--sage);
      color: var(--dark-brown);
      box-shadow: 0 2px 8px rgba(61, 43, 31, 0.2);
    }

    /* Form panels */
    .form-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .form-panel.active {
      display: flex;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dark-brown);
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(255, 252, 245, 0.7);
      background: rgba(255, 252, 245, 0.55);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: var(--dark-brown);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--sage);
      background: rgba(255, 252, 245, 0.8);
      box-shadow: 0 0 0 3px rgba(122, 158, 126, 0.25);
    }

    input::placeholder {
      color: #b09080;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-wrapper input {
      padding-right: 44px;
    }

    .eye-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #8a6e56;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .eye-toggle:hover {
      color: var(--sage);
    }

    .forgot {
      text-align: right;
      margin-top: 6px;
    }

    .forgot a {
      font-size: 0.82rem;
      color: #8a6e56;
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .forgot a:hover {
      color: var(--sage);
      text-shadow: 0 0 8px rgba(192, 103, 58, 0.3);
    }

    .btn-submit {
      margin-top: 4px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: rgba(122, 158, 126, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--dark-brown);
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 0 4px 0 #4a664d, 0 6px 16px rgba(61, 43, 31, 0.25);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #4a664d, 0 10px 22px rgba(61, 43, 31, 0.3);
    }

    .btn-submit:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 #4a664d;
    }

    .card-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 0.82rem;
      color: #6b5040;
      font-weight: 600;
    }

    .card-footer a {
      color: var(--sage);
      text-decoration: underline;
      cursor: pointer;
    }

    .card-footer a:hover {
      color: var(--dark-brown);
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #8a6e56;
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s, transform 0.15s;
      padding: 4px;
    }

    .close-btn:hover {
      color: var(--sage);
      transform: rotate(90deg);
    }

    /* status message */
    .msg {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }

    .msg.success {
      display: block;
      background: rgba(122, 158, 126, 0.25);
      color: #3a6e3e;
      border: 1px solid rgba(122, 158, 126, 0.5);
    }

    .msg.error {
      display: block;
      background: rgba(192, 103, 58, 0.15);
      color: var(--sage);
      border: 1px solid rgba(192, 103, 58, 0.4);
    }

    /* ── GOOGLE BUTTON ── */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(255, 252, 245, 0.6);
      background: rgba(255, 255, 255, 0.9);
      color: #3d2b1f;
      font-family: 'Nunito', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 2px 10px rgba(61, 43, 31, 0.12);
    }

    .btn-google:hover {
      background: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(61, 43, 31, 0.2);
    }

    .btn-google:active {
      transform: translateY(1px);
    }

    .btn-google svg {
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 2px 0;
    }

    .divider span {
      font-size: 0.75rem;
      color: #8a6e56;
      font-weight: 600;
      white-space: nowrap;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(61, 43, 31, 0.2);
    }
  </style>
</head>

<body>

  <div class="scene" id="scene"><img src="back.png" alt="Background" /></div>
  <div class="overlay" id="overlay"></div>

  <div class="stage">
    <div class="landing" id="landing">
      <div class="logo">
        <i class="fas fa-tractor" style="margin-right: 0.5rem; font-size: 0.7em;"></i>Farm<span>Track</span>
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="openCard('login')">Login</button>
        <button class="btn-secondary" onclick="openCard('signup')">Sign Up</button>
      </div>
    </div>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card">
      <button class="close-btn" onclick="closeCard()">✕</button>
      <div class="card-title">Welcome Back 🌾</div>
      <div class="card-sub" id="cardSub">Sign in to FarmTracker</div>

      <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">Login</div>
        <div class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <div class="form-panel active" id="panelLogin">
        <div>
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@farmtracker.com" />
        </div>
        <div>
          <label for="loginPass">Password</label>
          <div class="input-wrapper">
            <input type="password" id="loginPass" placeholder="••••••••" />
            <div class="eye-toggle" onclick="togglePassword('loginPass', this)">
              <i class="fas fa-eye"></i>
            </div>
          </div>
        </div>
        <div id="loginMsg" class="msg"></div>
        <button class="btn-submit" onclick="handleLogin()">Login</button>
      </div>

      <div class="form-panel" id="panelSignup">
        <div>
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Farmer John" />
        </div>
        <div>
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@farmtracker.com" />
        </div>
        <div>
          <label for="signupPass">Password</label>
          <div class="input-wrapper">
            <input type="password" id="signupPass" placeholder="••••••••" />
            <div class="eye-toggle" onclick="togglePassword('signupPass', this)">
              <i class="fas fa-eye"></i>
            </div>
          </div>
        </div>
        <div id="signupMsg" class="msg"></div>
        <button class="btn-submit" onclick="handleSignup()">Create Account</button>
      </div>

      <div class="card-footer" id="cardFooter">
        Don't have an account? <a onclick="switchTab('signup')">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script> -->

  <script>
    const scene = document.getElementById('scene');
    const overlay = document.getElementById('overlay');
    const landing = document.getElementById('landing');
    const cardWrap = document.getElementById('cardWrap');

    function openCard(tab) {
      scene.classList.add('blurred');
      overlay.classList.add('active');
      landing.classList.add('hidden');
      cardWrap.classList.add('visible');
      switchTab(tab);
    }

    function closeCard() {
      cardWrap.classList.remove('visible');
      setTimeout(() => {
        scene.classList.remove('blurred');
        overlay.classList.remove('active');
        landing.classList.remove('hidden');
      }, 200);
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabSignup').classList.toggle('active', !isLogin);
      document.getElementById('panelLogin').classList.toggle('active', isLogin);
      document.getElementById('panelSignup').classList.toggle('active', !isLogin);
      document.getElementById('cardSub').textContent = isLogin ? 'Sign in to FarmTracker' : 'Join FarmTracker today';
      document.getElementById('cardFooter').innerHTML = isLogin
        ? `Don't have an account? <a onclick="switchTab('signup')">Sign Up</a>`
        : `Already have an account? <a onclick="switchTab('login')">Login</a>`;
    }

    function togglePassword(id, el) {
      const input = document.getElementById(id);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      el.innerHTML = isPass ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (!email || !pass) { showMsg('loginMsg', 'Please fill in all fields', 'error'); return; }

      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });

      const result = await response.json();

      if (response.ok) {
        localStorage.setItem('userId', result.user.id);
        showMsg('loginMsg', 'Success! Taking you to dashboard...', 'success');
        setTimeout(() => {
          window.location.href = '/MainDash'; // Redirects to your dashboard
        }, 1000);
      } else {
        showMsg('loginMsg', result.error, 'error');
      }
    }

    async function handleSignup() {
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pass = document.getElementById('signupPass').value;
      if (!name || !email || !pass) { showMsg('signupMsg', 'Please fill in all fields', 'error'); return; }

      const response = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, name })
      });

      const result = await response.json();

      if (response.ok) {
        localStorage.setItem('userId', result.user.id);
        showMsg('signupMsg', 'Account created! You can now log in.', 'success');
        setTimeout(() => {
          switchTab('login'); // Automatically switches them to the login tab
          document.getElementById('loginEmail').value = email; // Pre-fills their email
        }, 1500);
      } else {
        showMsg('signupMsg', result.error, 'error');
      }
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
      setTimeout(() => el.style.display = 'none', 4000);
    }

    overlay.addEventListener('click', closeCard);
  </script>
</body>

</html>
