<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmTracker — Welcome</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream-light: #fdfbf7;
      --cream-dark: #f2e9db;
      --warm-tan: #c9a87c;
      --rust: #c0673a;
      --sage: #7a9e7e;
      --dark-brown: #3d2b1f;
      /* Adjusted glass opacity for better visibility on light background */
      --glass-bg: rgba(255, 252, 245, 0.75);
      --glass-border: rgba(255, 252, 245, 0.9);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      /* Smooth creamish-white gradient */
      background: radial-gradient(circle at center, var(--cream-light) 0%, var(--cream-dark) 100%);
      overflow: hidden;
      position: relative;
       background-image: url("back.png");
    background-size: cover;        /* fills full screen */
    background-position: center;   /* keeps image centered */
    background-repeat: no-repeat;  /* no repeating */
    background-attachment: fixed;
    }

    /* ── SCENE ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: filter 0.6s ease;
    }

    .scene.blurred {
      filter: contrast(0.9) brightness(0.95);
    }

    /* ── OVERLAY ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(61, 43, 31, 0);
      transition: background 0.6s ease;
      z-index: 1;
      pointer-events: none;
    }

    .overlay.active {
      background: rgba(61, 43, 31, 0.1);
    }

    /* ── STAGE ── */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── LANDING ── */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .landing.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      color: var(--dark-brown);
      font-size: clamp(2.5rem, 8vw, 4.2rem);
      letter-spacing: 0.02em;
      text-align: center;
    }

    .logo span {
      color: var(--rust);
    }

    .btn-group {
      display: flex;
      gap: 16px;
      margin-top: 10px;
    }

    .btn-primary,
    .btn-secondary {
      padding: 14px 40px;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: #ffffff;
      color: var(--dark-brown);
      border: 1px solid var(--warm-tan);
      box-shadow: 0 4px 15px rgba(61, 43, 31, 0.08);
      transition: all 0.2s ease;
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      transform: translateY(-2px);
      background: var(--cream-light);
      box-shadow: 0 8px 25px rgba(61, 43, 31, 0.12);
    }

    .btn-primary {
      background: var(--sage);
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: #6b8d6f;
      color: white;
    }

    /* ── MODAL CARD ── */
    .card-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }

    .card-wrap.visible {
      opacity: 1;
      pointer-events: all;
    }

    .card {
      background: var(--glass-bg);
      border: 1.5px solid var(--glass-border);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-radius: 24px;
      padding: 38px 40px 34px;
      width: min(400px, 90vw);
      box-shadow: 0 20px 60px rgba(61, 43, 31, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transform: translateY(24px) scale(0.96);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card-wrap.visible .card {
      transform: translateY(0) scale(1);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      color: var(--dark-brown);
      font-size: 1.7rem;
      margin-bottom: 6px;
      text-align: center;
    }

    .card-sub {
      text-align: center;
      font-size: 0.82rem;
      color: #6b5040;
      margin-bottom: 26px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(61, 43, 31, 0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 26px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: #8a6e56;
      cursor: pointer;
      border-radius: 9px;
      transition: all 0.2s;
    }

    .tab.active {
      background: white;
      color: var(--dark-brown);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .form-panel {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .form-panel.active {
      display: flex;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dark-brown);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(61, 43, 31, 0.1);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(122, 158, 126, 0.15);
    }

    .input-wrapper {
      position: relative;
    }

    .eye-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #8a6e56;
    }

    .btn-submit {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--dark-brown);
      color: white;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      background: #2a1d15;
      transform: translateY(-1px);
    }

    .close-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #8a6e56;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .close-btn:hover {
      transform: rotate(90deg);
      color: var(--rust);
    }

    .msg {
      font-size: 0.8rem;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      display: none;
    }

    .msg.success { display: block; background: #eef7ef; color: #3a6e3e; }
    .msg.error { display: block; background: #fdf2f2; color: #c0392b; }

    .card-footer {
      text-align: center;
      margin-top: 18px;
      font-size: 0.85rem;
      color: #6b5040;
    }

    .card-footer a {
      color: var(--rust);
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="scene" id="scene"></div>
  <div class="overlay" id="overlay"></div>

  <div class="stage">
    <div class="landing" id="landing">
      <div class="logo">
        <i class="fas fa-tractor" style="margin-right: 0.5rem; font-size: 0.7em;"></i>Farm<span>Track</span>
      </div>
      <div class="btn-group">
        <button class="btn-primary" onclick="openCard('login')">Login</button>
        <button class="btn-secondary" onclick="openCard('signup')">Sign Up</button>
      </div>
    </div>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card">
      <button class="close-btn" onclick="closeCard()">✕</button>
      <div class="card-title">Welcome Back 🌾</div>
      <div class="card-sub" id="cardSub">Sign in to FarmTracker</div>

      <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">Login</div>
        <div class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <div class="form-panel active" id="panelLogin">
        <div>
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@farmtracker.com" />
        </div>
        <div>
          <label for="loginPass">Password</label>
          <div class="input-wrapper">
            <input type="password" id="loginPass" placeholder="••••••••" />
            <div class="eye-toggle" onclick="togglePassword('loginPass', this)">
              <i class="fas fa-eye"></i>
            </div>
          </div>
        </div>
        <div id="loginMsg" class="msg"></div>
        <button class="btn-submit" onclick="handleLogin()">Login</button>
      </div>

      <div class="form-panel" id="panelSignup">
        <div>
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Farmer John" />
        </div>
        <div>
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@farmtracker.com" />
        </div>
        <div>
          <label for="signupPass">Password</label>
          <div class="input-wrapper">
            <input type="password" id="signupPass" placeholder="••••••••" />
            <div class="eye-toggle" onclick="togglePassword('signupPass', this)">
              <i class="fas fa-eye"></i>
            </div>
          </div>
        </div>
        <div id="signupMsg" class="msg"></div>
        <button class="btn-submit" onclick="handleSignup()">Create Account</button>
      </div>

      <div class="card-footer" id="cardFooter">
        Don't have an account? <a onclick="switchTab('signup')">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script> -->

  <script>
    const scene = document.getElementById('scene');
    const overlay = document.getElementById('overlay');
    const landing = document.getElementById('landing');
    const cardWrap = document.getElementById('cardWrap');

    function openCard(tab) {
      scene.classList.add('blurred');
      overlay.classList.add('active');
      landing.classList.add('hidden');
      cardWrap.classList.add('visible');
      switchTab(tab);
    }

    function closeCard() {
      cardWrap.classList.remove('visible');
      setTimeout(() => {
        scene.classList.remove('blurred');
        overlay.classList.remove('active');
        landing.classList.remove('hidden');
      }, 200);
    }

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabSignup').classList.toggle('active', !isLogin);
      document.getElementById('panelLogin').classList.toggle('active', isLogin);
      document.getElementById('panelSignup').classList.toggle('active', !isLogin);
      document.getElementById('cardSub').textContent = isLogin ? 'Sign in to FarmTracker' : 'Join FarmTracker today';
      document.getElementById('cardFooter').innerHTML = isLogin 
        ? `Don't have an account? <a onclick="switchTab('signup')">Sign Up</a>`
        : `Already have an account? <a onclick="switchTab('login')">Login</a>`;
    }

    function togglePassword(id, el) {
      const input = document.getElementById(id);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      el.innerHTML = isPass ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!email || !pass) { showMsg('loginMsg', 'Please fill in all fields', 'error'); return; }

        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pass })
        });

        const result = await response.json();
        
        if (response.ok) {
            showMsg('loginMsg', 'Success! Taking you to dashboard...', 'success');
            setTimeout(() => {
                window.location.href = '/MainDash'; // Redirects to your dashboard
            }, 1000);
        } else {
            showMsg('loginMsg', result.error, 'error');
        }
    }

    async function handleSignup() {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const pass = document.getElementById('signupPass').value;
        if (!name || !email || !pass) { showMsg('signupMsg', 'Please fill in all fields', 'error'); return; }

        const response = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password: pass, name })
        });

        const result = await response.json();
        
        if (response.ok) {
            showMsg('signupMsg', 'Account created! You can now log in.', 'success');
            setTimeout(() => {
                switchTab('login'); // Automatically switches them to the login tab
                document.getElementById('loginEmail').value = email; // Pre-fills their email
            }, 1500);
        } else {
            showMsg('signupMsg', result.error, 'error');
        }
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
      setTimeout(() => el.style.display = 'none', 4000);
    }

    overlay.addEventListener('click', closeCard);
  </script>
</body>
</html>
